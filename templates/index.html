<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>TIMBRE ANALYZER</title>
  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
          background: #0a0a0f;
          color: #c8d0e0;
          font-family: 'Courier New', monospace;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
      }

      .container {
          width: 680px;
          padding: 40px;
      }

      .header {
          text-align: center;
          margin-bottom: 48px;
      }

      .title {
          font-size: 28px;
          letter-spacing: 8px;
          color: #00f5c4;
          text-transform: uppercase;
      }

      .subtitle {
          font-size: 12px;
          letter-spacing: 3px;
          color: #445566;
          margin-top: 8px;
      }

      .waveform {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 3px;
          height: 48px;
          margin: 28px 0 0 0;
      }

      .bar {
          width: 3px;
          background: #00f5c4;
          border-radius: 2px;
          opacity: 0.5;
          animation: wave linear infinite;
      }

      @keyframes wave {
          0%, 100% { height: 4px; opacity: 0.3; }
          50% { height: 36px; opacity: 0.8; }
      }

      .upload-zone {
          border: 1px solid #1a2a3a;
          border-radius: 4px;
          padding: 60px 40px;
          text-align: center;
          background: #0d1117;
          transition: border-color 0.2s;
      }

      .upload-zone:hover {
          border-color: #00f5c4;
      }

      .upload-icon {
          font-size: 40px;
          margin-bottom: 20px;
          color: #1e3a4a;
      }

      .upload-label {
          font-size: 13px;
          letter-spacing: 2px;
          color: #445566;
          margin-bottom: 24px;
          display: block;
      }

      .file-input { display: none; }

      .file-btn {
          display: inline-block;
          padding: 10px 28px;
          border: 1px solid #00f5c4;
          color: #00f5c4;
          font-family: 'Courier New', monospace;
          font-size: 12px;
          letter-spacing: 3px;
          cursor: pointer;
          background: transparent;
          transition: all 0.2s;
      }

      .file-btn:hover {
          background: #00f5c4;
          color: #0a0a0f;
      }

      .file-name {
          font-size: 12px;
          color: #00f5c4;
          margin-top: 16px;
          min-height: 18px;
      }

      .submit-btn {
          width: 100%;
          margin-top: 24px;
          padding: 14px;
          background: transparent;
          border: 1px solid #1a2a3a;
          color: #445566;
          font-family: 'Courier New', monospace;
          font-size: 12px;
          letter-spacing: 4px;
          cursor: pointer;
          transition: all 0.2s;
      }

      .submit-btn.ready {
          border-color: #00f5c4;
          color: #00f5c4;
      }

      .submit-btn.ready:hover {
          background: #00f5c4;
          color: #0a0a0f;
      }

      .formats {
          text-align: center;
          margin-top: 20px;
          font-size: 11px;
          letter-spacing: 2px;
          color: #1e3a4a;
      }
  </style>
</head>
<body>
  <div class="container">
      <div class="header">
          <div class="title">TIMBRE ANALYZER</div>
          <div class="subtitle">AUDIO PRODUCTION ANALYSIS SYSTEM</div>
          <div class="waveform" id="waveform"></div>
      </div>

      <form action="/" method="POST" enctype="multipart/form-data">
          <div class="upload-zone">
              <div class="upload-icon">◈</div>
              <span class="upload-label">DROP AUDIO FILE OR SELECT</span>
              <label class="file-btn" for="audioInput">SELECT FILE</label>
              <input class="file-input" type="file" id="audioInput" name="audio"
                     accept=".mp3,.wav,.aac,.flac"
                     onchange="updateFileName(this)">
              <div class="file-name" id="fileName"></div>
          </div>
          <button class="submit-btn" type="submit" id="submitBtn">
              ▶ &nbsp; RUN ANALYSIS
          </button>
      </form>

      <div class="formats">SUPPORTED — MP3 / WAV / AAC / FLAC</div>
  </div>

  <script>
  function updateFileName(input) {
      const fileName = document.getElementById('fileName');
      const submitBtn = document.getElementById('submitBtn');
      if (input.files && input.files[0]) {
          fileName.textContent = input.files[0].name;
          submitBtn.classList.add('ready');
      }
  }

  // 拖拽功能
  const uploadZone = document.querySelector('.upload-zone');

  uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.style.borderColor = '#00f5c4';
  });

  uploadZone.addEventListener('dragleave', () => {
      uploadZone.style.borderColor = '#1a2a3a';
  });

  uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.style.borderColor = '#1a2a3a';
      const file = e.dataTransfer.files[0];
      if (file) {
          const input = document.getElementById('audioInput');
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          updateFileName(input);
      }
  });

  // 生成波形条
  const waveform = document.getElementById('waveform');
  for (let i = 0; i < 36; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
      bar.style.animationDelay = (Math.random() * 1) + 's';
      waveform.appendChild(bar);
  }
  </script>
</body>
</html>
